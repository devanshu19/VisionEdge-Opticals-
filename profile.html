<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - VisionEdge Opticals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <style>
        .profile-img-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--card-bg);
            box-shadow: var(--shadow-md);
            position: relative;
            margin: -75px auto 20px;
        }
        .profile-header-bg {
            height: 150px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }
        .profile-upload-btn {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            text-align: center;
            padding: 5px 0;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .profile-img-container:hover .profile-upload-btn {
            background: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
        <main class="main-content">
            <div id="navbar-container"></div>

            <div class="container-fluid py-4">
                <div class="d-flex align-items-center mb-4" data-aos="fade-down">
                    <div>
                        <h2 class="mb-0 fw-bold">My Profile</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none text-muted">Home</a></li>
                                <li class="breadcrumb-item active" aria-current="page">Profile</li>
                            </ol>
                        </nav>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-12 col-xl-4" data-aos="fade-right">
                        <div class="card text-center p-0 overflow-hidden">
                            <div class="profile-header-bg"></div>
                            <div class="profile-img-container">
                                <img src="https://picsum.photos/200/200?random=1" alt="Profile" class="w-100 h-100 object-fit-cover">
                                <div class="profile-upload-btn">
                                    <i class="bi bi-camera me-1"></i> Change
                                </div>
                            </div>
                            <div class="card-body pt-0 pb-4">
                                <h4 class="fw-bold mb-1">Admin User</h4>
                                <p class="text-muted mb-3">Store Manager</p>
                                <span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill mb-3">Active Account</span>
                                <hr>
                                <ul class="list-unstyled text-start text-muted mb-0">
                                    <li class="mb-2"><i class="bi bi-envelope me-2"></i> admin@visionedge.com</li>
                                    <li class="mb-2"><i class="bi bi-telephone me-2"></i> +1 (555) 123-4567</li>
                                    <li><i class="bi bi-geo-alt me-2"></i> New York, USA</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-xl-8" data-aos="fade-left">
                        <div class="card h-100">
                            <div class="card-header border-bottom px-4 py-3 bg-transparent">
                                <ul class="nav nav-tabs card-header-tabs" id="profileTabs" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active fw-medium text-main" data-bs-toggle="tab" data-bs-target="#editProfile">Edit Details</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link fw-medium text-muted" data-bs-toggle="tab" data-bs-target="#changePassword">Security</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="card-body p-4">
                                <div class="tab-content">
                                    <!-- Edit Profile -->
                                    <div class="tab-pane fade show active" id="editProfile">
                                        <form id="profileForm" class="needs-validation" novalidate>
                                            <div class="row g-3 mb-4">
                                                <div class="col-md-6">
                                                    <div class="form-floating">
                                                        <input type="text" class="form-control" id="fname" value="Admin" required>
                                                        <label for="fname">First Name</label>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="form-floating">
                                                        <input type="text" class="form-control" id="lname" value="User" required>
                                                        <label for="lname">Last Name</label>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="form-floating">
                                                        <input type="email" class="form-control" id="pemail" value="admin@visionedge.com" required>
                                                        <label for="pemail">Email Address</label>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="form-floating">
                                                        <input type="tel" class="form-control" id="pphone" value="5551234567" required>
                                                        <label for="pphone">Phone Number</label>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="text-end">
                                                <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">Save Changes</button>
                                            </div>
                                        </form>
                                    </div>
                                    
                                    <!-- Change Password -->
                                    <div class="tab-pane fade" id="changePassword">
                                        <form id="securityForm">
                                            <div class="form-floating mb-3">
                                                <input type="password" class="form-control" id="currentPwd" placeholder="Current Password" required>
                                                <label for="currentPwd">Current Password</label>
                                            </div>
                                            <div class="form-floating mb-3">
                                                <input type="password" class="form-control" id="newPwd" placeholder="New Password" required>
                                                <label for="newPwd">New Password</label>
                                            </div>
                                            <div class="form-floating mb-4">
                                                <input type="password" class="form-control" id="confirmPwd" placeholder="Confirm Password" required>
                                                <label for="confirmPwd">Confirm New Password</label>
                                            </div>
                                            <div class="text-end">
                                                <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">Update Password</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div id="footer-container"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({duration: 800, once: true});
        
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
            setTimeout(() => {
                showToast('Success', 'Profile updated successfully.');
                btn.innerHTML = 'Save Changes';
            }, 800);
        });
        
        document.getElementById('securityForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('Success', 'Password updated successfully.', 'success');
            e.target.reset();
        });
    </script>
    <script src="assets/js/app.js"></script>
</body>
</html>
