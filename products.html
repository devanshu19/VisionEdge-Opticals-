<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Catalog - VisionEdge Opticals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .product-card {
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .product-img-wrapper {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            border-radius: var(--border-radius) var(--border-radius) 0 0;
            overflow: hidden;
        }
        .product-img-wrapper img {
            max-height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
        <main class="main-content">
            <div id="navbar-container"></div>

            <div class="container-fluid py-4">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4" data-aos="fade-down">
                    <div class="mb-3 mb-md-0">
                        <h2 class="mb-0 fw-bold">Products Catalog</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="inventory.html" class="text-decoration-none text-muted">Inventory</a></li>
                                <li class="breadcrumb-item active" aria-current="page">Products</li>
                            </ol>
                        </nav>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card mb-4" data-aos="fade-up">
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-primary px-4 rounded-pill">All</button>
                            <button class="btn btn-outline-secondary px-4 rounded-pill">Frames</button>
                            <button class="btn btn-outline-secondary px-4 rounded-pill">Lenses</button>
                            <button class="btn btn-outline-secondary px-4 rounded-pill">Contact Lenses</button>
                            <button class="btn btn-outline-secondary px-4 rounded-pill">Accessories</button>
                        </div>
                    </div>
                </div>

                <!-- Product Grid -->
                <div class="row g-4" id="productsGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div id="footer-container"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({duration: 800, once: true});</script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/inventory.js"></script>
</body>
</html>
