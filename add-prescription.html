<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Prescription - VisionEdge Opticals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <style>
        .rx-table th { background-color: var(--bg-color); font-weight: 600; text-align: center; }
        .rx-table td { padding: 0.5rem; }
        .rx-table input { text-align: center; font-weight: 500; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
        <main class="main-content">
            <div id="navbar-container"></div>

            <div class="container-fluid py-4">
                <div class="d-flex align-items-center mb-4" data-aos="fade-down">
                    <a href="prescriptions.html" class="btn btn-link text-main p-0 me-3 fs-4"><i class="bi bi-arrow-left"></i></a>
                    <div>
                        <h2 class="mb-0 fw-bold">New Prescription</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="prescriptions.html" class="text-decoration-none text-muted">Prescriptions</a></li>
                                <li class="breadcrumb-item active" aria-current="page">New</li>
                            </ol>
                        </nav>
                    </div>
                </div>

                <div class="card" data-aos="fade-up">
                    <div class="card-body p-4 p-md-5">
                        <form id="rxForm" class="needs-validation" novalidate>
                            
                            <!-- General Info -->
                            <div class="row g-4 mb-5">
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select" id="customerSelect" required>
                                            <option value="" selected disabled>Search or Select Customer</option>
                                            <option value="1">Alexander Pierce (CUST-001)</option>
                                            <option value="2">Sarah Connor (CUST-002)</option>
                                        </select>
                                        <label for="customerSelect"><i class="bi bi-person me-2"></i>Customer</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-floating">
                                        <input type="date" class="form-control" id="rxDate" required value="2023-10-26">
                                        <label for="rxDate">Prescription Date</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-floating">
                                        <input type="date" class="form-control" id="expiryDate" value="2025-10-26">
                                        <label for="expiryDate">Expiry Date</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Rx Table -->
                            <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Rx Details</h5>
                            <div class="table-responsive mb-4">
                                <table class="table table-bordered rx-table align-middle">
                                    <thead>
                                        <tr>
                                            <th style="width: 15%">Eye</th>
                                            <th>SPH (Sphere)</th>
                                            <th>CYL (Cylinder)</th>
                                            <th>AXIS</th>
                                            <th>ADD (Addition)</th>
                                            <th>PD (Pupillary Dist.)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td class="fw-bold text-center text-primary bg-light">OD (Right Eye)</td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="+0.00"></td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="-0.00"></td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="180"></td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="+2.00"></td>
                                            <td rowspan="2" class="align-middle"><input type="text" class="form-control" placeholder="62"></td>
                                        </tr>
                                        <tr>
                                            <td class="fw-bold text-center text-info bg-light">OS (Left Eye)</td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="+0.00"></td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="-0.00"></td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="180"></td>
                                            <td><input type="text" class="form-control form-control-sm" placeholder="+2.00"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Notes -->
                            <div class="form-floating mb-4">
                                <textarea class="form-control" placeholder="Doctor's Notes" id="notes" style="height: 100px"></textarea>
                                <label for="notes">Doctor's Notes / Recommendations</label>
                            </div>

                            <div class="d-flex justify-content-between">
                                <button type="button" class="btn btn-outline-secondary"><i class="bi bi-printer me-2"></i>Print Template</button>
                                <div class="gap-2 d-flex">
                                    <button type="button" class="btn btn-light px-4" onclick="window.history.back()">Cancel</button>
                                    <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">Save Prescription</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
            <div id="footer-container"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({duration: 800, once: true});
        
        document.getElementById('rxForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
            setTimeout(() => {
                showToast('Success', 'Prescription saved successfully.');
                setTimeout(()=> window.location.href='prescriptions.html', 1000);
            }, 800);
        });
    </script>
    <script src="assets/js/app.js"></script>
</body>
</html>
