<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - VisionEdge Opticals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/tables.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
        <main class="main-content">
            <div id="navbar-container"></div>

            <div class="container-fluid py-4">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4" data-aos="fade-down">
                    <div class="mb-3 mb-md-0">
                        <h2 class="mb-0 fw-bold">Inventory Management</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none text-muted">Home</a></li>
                                <li class="breadcrumb-item active" aria-current="page">Inventory</li>
                            </ol>
                        </nav>
                    </div>
                    <div>
                        <a href="products.html" class="btn btn-outline-secondary me-2 shadow-sm">
                            <i class="bi bi-tags me-2"></i>Product Catalog
                        </a>
                        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addProductModal">
                            <i class="bi bi-plus-circle me-2"></i>Add Stock
                        </button>
                    </div>
                </div>

                <!-- KPI Cards for Inventory -->
                <div class="row g-4 mb-4">
                    <div class="col-12 col-md-4" data-aos="fade-up" data-aos-delay="100">
                        <div class="card bg-primary text-white h-100 border-0">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-white-50 fw-bold text-uppercase mb-1">Total Items</h6>
                                        <h3 class="mb-0 fw-bold">8,502</h3>
                                    </div>
                                    <div class="bg-white bg-opacity-25 rounded p-3">
                                        <i class="bi bi-box-seam fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4" data-aos="fade-up" data-aos-delay="200">
                        <div class="card bg-warning text-dark h-100 border-0">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-dark text-opacity-75 fw-bold text-uppercase mb-1">Low Stock Alerts</h6>
                                        <h3 class="mb-0 fw-bold">12</h3>
                                    </div>
                                    <div class="bg-dark bg-opacity-10 rounded p-3">
                                        <i class="bi bi-exclamation-triangle fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4" data-aos="fade-up" data-aos-delay="300">
                        <div class="card bg-success text-white h-100 border-0">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-white-50 fw-bold text-uppercase mb-1">Value of Stock</h6>
                                        <h3 class="mb-0 fw-bold">$45,200</h3>
                                    </div>
                                    <div class="bg-white bg-opacity-25 rounded p-3">
                                        <i class="bi bi-currency-dollar fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" data-aos="fade-up" data-aos-delay="400">
                    <div class="card-header d-flex flex-column flex-md-row justify-content-between align-items-md-center py-3">
                        <h5 class="mb-3 mb-md-0 fw-bold">Stock List</h5>
                        
                        <div class="d-flex flex-column flex-sm-row gap-2">
                            <div class="input-group" style="max-width: 250px;">
                                <span class="input-group-text bg-transparent"><i class="bi bi-search"></i></span>
                                <input type="text" class="form-control" id="searchInventory" placeholder="Search items...">
                            </div>
                            <select class="form-select w-auto" id="filterCategory">
                                <option value="all">All Categories</option>
                                <option value="Frames">Frames</option>
                                <option value="Lenses">Lenses</option>
                                <option value="Contact Lens">Contact Lens</option>
                                <option value="Accessories">Accessories</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Item Code</th>
                                        <th>Product Name</th>
                                        <th>Category</th>
                                        <th>Brand</th>
                                        <th>Stock</th>
                                        <th>Unit Price</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="inventoryTableBody">
                                    <!-- Populated via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Product Details Modal -->
            <div class="modal fade" id="productDetailsModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header border-bottom-0 pb-0">
                            <h5 class="modal-title fw-bold">Product Details</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body pt-2" id="modalBodyContent">
                            <!-- Populated dynamically -->
                        </div>
                        <div class="modal-footer border-top-0">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary"><i class="bi bi-pencil me-2"></i>Edit Stock</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add Stock Modal -->
            <div class="modal fade" id="addProductModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Add New Stock</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" class="form-control" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Category</label>
                                        <select class="form-select">
                                            <option>Frames</option>
                                            <option>Lenses</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Brand</label>
                                        <input type="text" class="form-control">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Quantity</label>
                                        <input type="number" class="form-control" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Price</label>
                                        <input type="text" class="form-control" required>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer border-top-0">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="showToast('Success', 'Stock added successfully')">Add Stock</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="footer-container"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({duration: 800, once: true});</script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/inventory.js"></script>
</body>
</html>
