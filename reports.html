<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - VisionEdge Opticals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
        <main class="main-content">
            <div id="navbar-container"></div>

            <div class="container-fluid py-4">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4" data-aos="fade-down">
                    <div class="mb-3 mb-md-0">
                        <h2 class="mb-0 fw-bold">Analytics & Reports</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none text-muted">Home</a></li>
                                <li class="breadcrumb-item active" aria-current="page">Reports</li>
                            </ol>
                        </nav>
                    </div>
                    <div>
                        <button class="btn btn-danger shadow-sm me-2" onclick="showToast('Success', 'PDF Downloaded Successfully')"><i class="bi bi-file-pdf me-2"></i>Export PDF</button>
                        <button class="btn btn-success shadow-sm" onclick="showToast('Success', 'Excel Exported Successfully')"><i class="bi bi-file-excel me-2"></i>Export Excel</button>
                    </div>
                </div>

                <!-- Report Filters -->
                <div class="card mb-4" data-aos="fade-up" data-aos-delay="100">
                    <div class="card-body">
                        <form class="row g-3 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold">Report Type</label>
                                <select class="form-select border-0 bg-light">
                                    <option>Sales Report</option>
                                    <option>Inventory Report</option>
                                    <option>Payment Report</option>
                                    <option>Customer Report</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold">Date Range</label>
                                <select class="form-select border-0 bg-light">
                                    <option>This Month</option>
                                    <option>Last Month</option>
                                    <option>This Year</option>
                                    <option>Custom Range</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-primary w-100"><i class="bi bi-funnel me-2"></i>Filter</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Charts -->
                <div class="row g-4 mb-4">
                    <div class="col-12 col-xl-8" data-aos="fade-up" data-aos-delay="200">
                        <div class="card h-100">
                            <div class="card-header border-0 pt-4 pb-0">
                                <h5 class="fw-bold">Sales & Revenue Trend</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container" style="height: 350px;">
                                    <canvas id="salesTrendChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-xl-4" data-aos="fade-up" data-aos-delay="300">
                        <div class="card h-100">
                            <div class="card-header border-0 pt-4 pb-0">
                                <h5 class="fw-bold">Customer Demographics</h5>
                            </div>
                            <div class="card-body d-flex align-items-center justify-content-center">
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="demoChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Data Summary -->
                <div class="row g-4">
                    <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
                        <div class="card bg-primary bg-opacity-10 border-0 h-100 text-center p-4">
                            <h6 class="text-primary fw-bold text-uppercase">Total Sales</h6>
                            <h2 class="fw-bold text-dark mb-0">$142,500</h2>
                            <small class="text-success"><i class="bi bi-arrow-up"></i> 18% vs Last Year</small>
                        </div>
                    </div>
                    <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                        <div class="card bg-success bg-opacity-10 border-0 h-100 text-center p-4">
                            <h6 class="text-success fw-bold text-uppercase">Avg. Order Value</h6>
                            <h2 class="fw-bold text-dark mb-0">$125.40</h2>
                            <small class="text-success"><i class="bi bi-arrow-up"></i> 5% vs Last Year</small>
                        </div>
                    </div>
                    <div class="col-md-4" data-aos="fade-up" data-aos-delay="300">
                        <div class="card bg-info bg-opacity-10 border-0 h-100 text-center p-4">
                            <h6 class="text-info fw-bold text-uppercase">New Customers</h6>
                            <h2 class="fw-bold text-dark mb-0">845</h2>
                            <small class="text-success"><i class="bi bi-arrow-up"></i> 12% vs Last Year</small>
                        </div>
                    </div>
                </div>

            </div>
            <div id="footer-container"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({duration: 800, once: true});</script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/reports.js"></script>
</body>
</html>
